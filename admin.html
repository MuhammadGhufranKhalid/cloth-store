<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="brand">Cloth Admin</h2>

    <nav>
      <a href="#dashboard">Dashboard</a>
      <a href="#products">Products</a>
      <a href="#users">Users</a>
      <a href="index.html">Store</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="dashboard">

    <div class="topbar">
      <div>
        <h1>Admin Dashboard</h1>
        <p>Manage your store products and users</p>
      </div>
    </div>

    <!-- STATS CARDS -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Products</h3>
        <p id="totalProducts">0</p>
      </div>

      <div class="stat-card">
        <h3>Total Users</h3>
        <p id="totalUsers">0</p>
      </div>

      <div class="stat-card">
        <h3>Cart Items</h3>
        <p id="totalCartItems">0</p>
      </div>
    </div>

    <!-- PRODUCT FORM -->
    <section class="panel" id="products">
      <div class="panel-header">
        <h2>Add / Edit Product</h2>
      </div>

      <div class="form-grid">
        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price">
        <input type="text" id="image" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
      </div>
    </section>

    <!-- PRODUCT LIST -->
    <section class="panel">
      <div class="panel-header">
        <h2>Products</h2>
      </div>

      <div id="productList" class="dashboard-list"></div>
    </section>

    <!-- USERS LIST -->
    <section class="panel" id="users">
      <div class="panel-header">
        <h2>Users</h2>
      </div>

      <div id="userList" class="dashboard-list"></div>
    </section>

  </main>

</div>

<script src="admin.js"></script>
</body>
</html>
